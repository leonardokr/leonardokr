<svg width="495" height="195" viewBox="0 0 495 195" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="puzzle-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:1" />
    <stop offset="100%" style="stop-color:#a371f7;stop-opacity:1" />
  </linearGradient>
  <clipPath id="card-rounded">
    <rect x="0" y="0" width="495" height="195" rx="6" ry="6"/>
  </clipPath>
  <clipPath id="treemap-clip">
    <rect x="0" y="0" width="455" height="135" rx="4" ry="4"/>
  </clipPath>
</defs>

<style>
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }
  .animate-fade { animation: fadeInUp 0.6s ease forwards; opacity: 0; }
  .puzzle-rect { animation: scaleIn 0.5s ease forwards; opacity: 0; }
  .delay-1 { animation-delay: 0.1s; }
  .delay-2 { animation-delay: 0.2s; }
  .delay-3 { animation-delay: 0.3s; }
  .delay-4 { animation-delay: 0.4s; }
  .delay-5 { animation-delay: 0.5s; }
  .delay-6 { animation-delay: 0.6s; }
  .delay-7 { animation-delay: 0.7s; }
  .delay-8 { animation-delay: 0.8s; }
  .puzzle-text {
    font-family: 'Segoe UI', Ubuntu, 'Helvetica Neue', Sans-Serif;
    font-weight: 600;
    font-size: 12px;
    fill: #FFFFFF;
    pointer-events: none;
  }
  .puzzle-percent {
    font-family: 'Segoe UI', Ubuntu, 'Helvetica Neue', Sans-Serif;
    font-weight: 400;
    font-size: 10px;
    fill: #FFFFFF;
    opacity: 0.85;
    pointer-events: none;
  }
</style>

